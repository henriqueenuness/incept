<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</script>
</head>
<body>
    <a href="{% url 'explore_pg' %}">explore</a>
    <form action ='{% url "search_user" %}' method="GET">
        {% csrf_token %}
        <input name="search" placeholder="Looking for something new?" value="{{ search }}">
        <button type="submit"></button>
    </form>
    <div class="answer">
        {% for user in users %}
        <div class="user">
            <div class="profileandnick">
                <div class="profile-circle"><div class="core-picture"><img src="data:image/png;base64, {{ user.core_picture }}"></div></div>
                <a href="{% url 'core_pg' user.nick %}">@{{ user.nick }}</a>
            </div>
        </div>
        {% empty %}
        {% endfor %}
    </div>
</body>
<script>
    const csrftoken = "{{ csrf_token}}";
    document.querySelectorAll('.follow-btn').forEach(btn => {

        btn.addEventListener('click',() => {
        const url = btn.getAttribute('data-url');
            fetch(url,{
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                }
            })
.then(response => response.json())
.then(data=>{
    if(data.is_following){
        btn.textContent = 'Seguindo';
    } else {
        btn.textContent = 'Seguir';
    }
})



        });
    });
</script>
</html>

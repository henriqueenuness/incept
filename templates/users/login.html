{% extends "base.html" %}

{% block title %}Incept | Login{% endblock %}

{% block content %}
<section class="auth-wrap">
    <form action="{% url 'login' %}" class="auth-card stack" method="POST">
        {% csrf_token %}
        <span class="eyebrow">Voltar ao fluxo</span>
        <h2>Entre e retome sua órbita criativa.</h2>
        <p>Seu próximo encontro visual pode estar a um clique de distância.</p>
        <div class="form-grid">
            <input class="field" type="email" placeholder="email" name="email">
            <input class="field" type="password" placeholder="senha" name="password">
        </div>
        <button class="button" type="submit">Entrar</button>
        <p>Não tem conta? <a class="accent" href="{% url 'signup_pg' %}">Criar agora</a></p>
    </form>
</section>
{% endblock %}
